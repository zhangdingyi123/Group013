services:
  - type: web
    name: ta-recruitment
    runtime: docker
    autoDeploy: true
    plan: starter
    healthCheckPath: /
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: JAVA_TOOL_OPTIONS
