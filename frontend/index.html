<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TA 招聘系统 - 北邮国际学院</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>TA 招聘系统</h1>
      <p class="subtitle">北邮国际学院 · 前后端分离</p>
    </header>

    <!-- 首页：角色选择 -->
    <section id="view-home" class="view">
      <div class="card-grid">
        <button type="button" class="card" data-role="ta">助教 (TA)</button>
        <button type="button" class="card" data-role="mo">课程负责人 (MO)</button>
        <button type="button" class="card" data-role="admin">管理员 (Admin)</button>
      </div>
    </section>

    <!-- TA：登录/注册 -->
    <section id="view-ta-auth" class="view hidden">
      <nav><button type="button" class="link back">← 返回</button></nav>
      <div class="panel">
        <h2>助教 · 登录 / 注册</h2>
        <div class="tabs">
          <button type="button" class="tab active" data-tab="login">登录</button>
          <button type="button" class="tab" data-tab="register">注册</button>
        </div>
        <form id="ta-login" class="form">
          <label>邮箱 <input type="email" name="email" required></label>
          <button type="submit">登录</button>
        </form>
        <form id="ta-register" class="form hidden">
          <label>姓名 <input type="text" name="name" required></label>
          <label>邮箱 <input type="email" name="email" required></label>
          <button type="submit">注册</button>
        </form>
      </div>
    </section>

    <!-- TA：主界面 -->
    <section id="view-ta-main" class="view hidden">
      <nav><button type="button" class="link back">← 返回</button> <span id="ta-name"></span> <button type="button" class="link" id="ta-logout">退出</button></nav>
      <div class="panel">
        <h2>助教工作台</h2>
        <div class="tabs">
          <button type="button" class="tab active" data-tab="profile">我的资料</button>
          <button type="button" class="tab" data-tab="jobs">可申请职位</button>
          <button type="button" class="tab" data-tab="my-apps">我的申请</button>
        </div>
        <div id="ta-profile" class="tab-panel">
          <p>简历路径：<input type="text" id="ta-cv-path" placeholder="如 cv.txt"> <button type="button" id="ta-save-cv">保存</button></p>
          <p>技能（逗号分隔）：<input type="text" id="ta-skills" placeholder="Java, 数学"> <button type="button" id="ta-save-skills">保存</button></p>
        </div>
        <div id="ta-jobs" class="tab-panel hidden">
          <ul id="ta-job-list"></ul>
          <p>申请职位 ID：<input type="text" id="ta-apply-job-id"> <button type="button" id="ta-apply-btn">提交申请</button></p>
        </div>
        <div id="ta-my-apps" class="tab-panel hidden">
          <ul id="ta-app-list"></ul>
        </div>
      </div>
    </section>

    <!-- MO：登录/注册 -->
    <section id="view-mo-auth" class="view hidden">
      <nav><button type="button" class="link back">← 返回</button></nav>
      <div class="panel">
        <h2>课程负责人 · 登录 / 注册</h2>
        <div class="tabs">
          <button type="button" class="tab active" data-tab="login">登录</button>
          <button type="button" class="tab" data-tab="register">注册</button>
        </div>
        <form id="mo-login" class="form">
          <label>邮箱 <input type="email" name="email" required></label>
          <button type="submit">登录</button>
        </form>
        <form id="mo-register" class="form hidden">
          <label>姓名 <input type="text" name="name" required></label>
          <label>邮箱 <input type="email" name="email" required></label>
          <button type="submit">注册</button>
        </form>
      </div>
    </section>

    <!-- MO：主界面 -->
    <section id="view-mo-main" class="view hidden">
      <nav><button type="button" class="link back">← 返回</button> <span id="mo-name"></span> <button type="button" class="link" id="mo-logout">退出</button></nav>
      <div class="panel">
        <h2>课程负责人工作台</h2>
        <div class="tabs">
          <button type="button" class="tab active" data-tab="post">发布职位</button>
          <button type="button" class="tab" data-tab="my-jobs">我的职位</button>
          <button type="button" class="tab" data-tab="select">选择申请人</button>
        </div>
        <div id="mo-post" class="tab-panel">
          <form id="mo-post-job" class="form">
            <label>职位标题 <input type="text" name="title" required></label>
            <label>课程代码 <input type="text" name="moduleCode" required></label>
            <label>所需技能（逗号分隔）<input type="text" name="requiredSkills" placeholder="Java, 辅导"></label>
            <button type="submit">发布</button>
          </form>
        </div>
        <div id="mo-my-jobs" class="tab-panel hidden">
          <ul id="mo-job-list"></ul>
        </div>
        <div id="mo-select" class="tab-panel hidden">
          <p>职位 ID：<input type="text" id="mo-select-job-id"> <button type="button" id="mo-load-apps">加载申请</button></p>
          <ul id="mo-app-list"></ul>
          <p>选择申请 ID：<input type="text" id="mo-select-app-id"> <button type="button" id="mo-select-btn">录用</button></p>
        </div>
      </div>
    </section>

    <!-- Admin：工作量 -->
    <section id="view-admin" class="view hidden">
      <nav><button type="button" class="link back">← 返回</button></nav>
      <div class="panel">
        <h2>管理员 · TA 工作量</h2>
        <table id="admin-workload">
          <thead><tr><th>姓名</th><th>邮箱</th><th>已分配职位数</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
