# 智能小助手：密钥、模型与接口（密钥写入仓库存在泄露风险，请自行权衡）
# 环境变量优先：KIMI_API_KEY / MOONSHOT_API_KEY / QWEN_API_KEY / DASHSCOPE_API_KEY / OPENAI_API_KEY
# 若 classpath 读不到本文件，可设 ASSISTANT_PROPERTIES_PATH 或 -Dassistant.properties.path= 指向本文件的绝对路径

# --- API 密钥（在此填写或留空仅用一方）---
kimi.api.key=sk-8EL49euks9BAoDqvyA1jT6FeP3apuEKYGeC6NqNWEiNnic0t
moonshot.api.key=
qwen.api.key=sk-683a544ad1d14d479f51fd3ff5ae8814
dashscope.api.key=
openai.api.key=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

# 默认选用的提供方：kimi / qwen / openai（未设置时优先使用已配置密钥的一方）
assistant.default.provider=kimi

# Kimi（月之暗面 Moonshot，OpenAI 兼容）
kimi.model=kimi-k2.5
kimi.chat.completions.url=https://api.moonshot.cn/v1/chat/completions

# 通义千问（阿里云 DashScope 兼容模式）
qwen.model=qwen-plus
qwen.chat.completions.url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

# OpenAI（官方 Chat Completions）
openai.model=gpt-4o-mini
openai.chat.completions.url=https://api.openai.com/v1/chat/completions

# --- 语义匹配（向量 embeddings，可选；默认关闭）---
# 开启后，匹配分将优先采用向量余弦相似度（0-100），并缓存到 data/embeddings.json
match.semantic.enabled=false
# match.semantic.provider=kimi|qwen|openai（不填则跟随 assistant.default.provider）
match.semantic.provider=

# Embeddings 配置（OpenAI 兼容；不填时会尝试由 chat.completions.url 推断 /embeddings）
openai.embeddings.url=
openai.embedding.model=text-embedding-3-small
kimi.embeddings.url=
kimi.embedding.model=
qwen.embeddings.url=
qwen.embedding.model=

# --- 额度与付费（可选）---
# 每个用户每月免费对话次数（超出后会尝试扣付费点数；两者都没有则返回 402）
assistant.monthly.free.quota=30
# 兑换码/充值码（模拟付费后的发码流程）；留空则禁用 /api/assistant/quota/topup
assistant.topup.code=
# --- 微信支付 Native 扫码（路径 B：配置齐全时 /assistant 展示「生成微信收款码」，无需兑换码）---
#
# 【商户平台侧】
# 1) 注册/登录 pay.weixin.qq.com，完成商户进件，获取商户号 mchid。
# 2) 产品中心开通「Native 支付」（扫码支付）。
# 3) 账户中心 → API 安全：设置「APIv3 密钥」（32 位）；申请「商户 API 证书」，下载证书工具生成的包，
#    取出 apiclient_key.pem（PKCS#8 私钥）放到服务器安全目录，记下「证书序列号」。
# 4) 使用与商户号绑定的公众号/小程序/开放平台 AppID（与 Native 下单所用 appid 一致）。
# 5) 支付配置 → Native 支付 / 开发配置：填写「支付授权目录」等按微信文档要求；
#    「支付结果通知 URL」必须填为本应用公网地址，且与下方 notify.url 完全一致（含 https、域名、上下文路径）。
#
# 【本应用侧】填写下列项或等价环境变量后重启服务；私钥路径为服务器绝对路径，勿提交私钥到 Git。
# 配置键                          环境变量（优先）
# assistant.pay.wechat.appid      WECHAT_PAY_APPID
# assistant.pay.wechat.mchid      WECHAT_PAY_MCHID
# assistant.pay.wechat.merchant.serial   WECHAT_PAY_MERCHANT_SERIAL
# assistant.pay.wechat.api.v3.key        WECHAT_PAY_API_V3_KEY（必须 32 位）
# assistant.pay.wechat.private.key.path  WECHAT_PAY_PRIVATE_KEY_PATH（apiclient_key.pem 绝对路径）
# assistant.pay.wechat.notify.url        WECHAT_PAY_NOTIFY_URL（公网 HTTPS，示例见下行）
# assistant.pay.wechat.fen.per.credit    WECHAT_PAY_FEN_PER_CREDIT（可选，每「点」价格，单位分，默认 10）
# assistant.pay.wechat.description       WECHAT_PAY_DESCRIPTION（可选，订单描述，默认「小助手额度充值」）
#
# 回调路径固定为：{notify.url 所在主机}{contextPath}/api/assistant/pay/wechat/notify
# 独立 Tomcat 部署 WAR 名为 ta-recruitment 时 contextPath 多为 /ta-recruitment，例如：
#   https://你的域名/ta-recruitment/api/assistant/pay/wechat/notify
# 内嵌 tomcat7:run 且 path=/ 时无额外前缀，例如：https://你的域名/api/assistant/pay/wechat/notify
#
#assistant.pay.wechat.appid=
#assistant.pay.wechat.mchid=
#assistant.pay.wechat.merchant.serial=
#assistant.pay.wechat.api.v3.key=
#assistant.pay.wechat.private.key.path=
#assistant.pay.wechat.notify.url=https://你的域名/ta-recruitment/api/assistant/pay/wechat/notify
#assistant.pay.wechat.fen.per.credit=10
#assistant.pay.wechat.description=
# 额度用尽后的提示文案（会附带在 402 返回中，前端可展示）
assistant.pay.hint=免费额度已用完，请联系管理员付费开通/充值后继续使用。
